<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>#LuLz</title>
<link rel="icon" href="https://files.catbox.moe/g79cqn.png">

<style>
body, html{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  overflow:auto;
  scrollbar-width:none;
  -ms-overflow-style:none;
}
body::-webkit-scrollbar{display:none;}

.video-section{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
}

.bg-video{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
}

#overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.5rem;
  cursor:pointer;
  transition:opacity .5s ease;
  z-index:10;
  user-select:none;
}

#overlay.hidden{
  opacity:0;
  pointer-events:none;
}

.content{
  position:relative;
  background:#000;
  min-height:25vh;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:2;
}

.icon-row{
  display:flex;
  gap:2rem;
  flex-wrap:wrap;
  justify-content:center;
}

.icon{
  position:relative;
  display:inline-block;
  cursor:pointer;
}

.icon img{
  width:64px;
  height:64px;
  object-fit:contain;
  transition:transform .2s ease;
}

.icon:hover img{
  transform:scale(1.2);
}

.tooltip{
  position:absolute;
  bottom:110%;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.8);
  padding:4px 8px;
  border-radius:4px;
  font-size:.8rem;
  white-space:nowrap;
  opacity:0;
  visibility:hidden;
  transition:opacity .2s ease;
  pointer-events:none;
}

.icon:hover .tooltip{
  opacity:1;
  visibility:visible;
}

#view-counter{
  position:absolute;
  top:20px;
  right:20px;
  display:flex;
  align-items:center;
  gap:6px;
  font-size:1.4rem;
  opacity:0;
  transition:opacity .5s ease;
  pointer-events:none;
  z-index:15;
}

#view-counter.visible{opacity:1;}

#view-counter img{
  width:1.6em;
  height:1.6em;
  object-fit:contain;
}
</style>
</head>
<body>

<div class="video-section">
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="https://files.catbox.moe/v1qtxx.mp4" type="video/mp4">
  </video>
</div>

<audio id="music" loop>
  <source src="https://files.catbox.moe/6to5kk.mp3" type="audio/mpeg">
</audio>

<div id="overlay">click to enter...</div>

<div class="content">
  <div class="icon-row">

    <a class="icon" href="https://discord.com/users/392543250973589504" target="_blank">
      <img src="https://files.catbox.moe/dik4cx.png" alt="Discord">
    </a>

    <a class="icon" href="https://t.me/mcspade" target="_blank">
      <img src="https://files.catbox.moe/gwzjqm.png" alt="Telegram">
    </a>

    <a class="icon" href="https://soundcloud.com/j6qc" target="_blank">
      <img src="https://files.catbox.moe/kq8pfo.png" alt="SoundCloud">
    </a>

    <a class="icon" href="https://www.roblox.com/users/7573425183/profile" target="_blank">
      <img src="https://files.catbox.moe/z21yca.png" alt="Roblox">
    </a>

    <div class="icon" data-copy="bc1q5vh6zfycpyaaphdc9mwvgspd36jdxtevpg08r3">
      <img src="https://files.catbox.moe/racp3j.png" alt="Bitcoin">
    </div>

    <div class="icon" data-copy="0xB45710783262A5112E30C5ad46b9Cfa7e89442cD">
      <img src="https://files.catbox.moe/qgkqp3.png" alt="Ethereum">
    </div>

    <div class="icon" data-copy="LiWErv32WhQRKbMKUvCpBJR7sdXbH8YtQs">
      <img src="https://files.catbox.moe/ovwnqc.png" alt="Litecoin">
    </div>

    <div class="icon" data-copy="87WL9RXgKhFUmrq8TQNkkL1bXZo94tziRYcb9AD7TX8A6DHdpRGbXrcUzUgwECDceHcMsdSvtTPLXJnBWUZEJW3Y1dXthun">
      <img src="https://files.catbox.moe/ytva5h.png" alt="Monero">
    </div>

  </div>
</div>

<div id="view-counter">
  <img src="https://files.catbox.moe/n7pl2r.png" alt="">
  <span id="count">0</span>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const sb = createClient(
  "https://xmhrlabgazzjhxdernwv.supabase.co",
  "sb_publishable_XpxtJlAqH_4JVuCQvSiR9g_0HHgL4Kt"
);

const overlay = document.getElementById("overlay");
const music = document.getElementById("music");
const counterBox = document.getElementById("view-counter");
const countEl = document.getElementById("count");

// update counter
async function updateViews(){
  try{
    await sb.rpc("increment_site_counter");
    const res = await sb
      .from("site_counter")
      .select("views")
      .eq("id",1)
      .limit(1);

    if(res.data && res.data[0]){
      countEl.textContent = res.data[0].views;
    }
  }catch(e){
    console.log(e);
  }
}

updateViews();

// enter click
overlay.onclick = function(){
  if(document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen().catch(()=>{});
  }

  music.play().catch(()=>{});

  overlay.classList.add("hidden");
  setTimeout(function(){
    overlay.remove();
  },500);

  counterBox.classList.add("visible");
};

// copy handlers
const copyIcons = document.querySelectorAll(".icon[data-copy]");
for(let i=0;i<copyIcons.length;i++){
  copyIcons[i].addEventListener("click",function(){
    const val = this.getAttribute("data-copy");
    navigator.clipboard.writeText(val).then(function(){
      alert("Copied: "+val);
    }).catch(function(err){
      console.log(err);
    });
  });
}
</script>

</body>
</html>
