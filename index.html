<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>#lulz</title>

  <link rel="icon" type="image/png" href="https://asset.verslaving.lol/verslaving/troll-left.png">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      cursor:url("https://asset.verslaving.lol/verslaving/cursor.cur") 0 0, auto;
    }

    html,
    body{
      width:100%;
      height:100%;
    }

    body{
      background:#000;
      overflow:hidden;

      display:flex;
      justify-content:center;
      align-items:center;

      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
    }

    #bgVideo{
      position:fixed;
      inset:0;

      width:100%;
      height:100%;

      object-fit:cover;

      opacity:0;
      z-index:0;

      pointer-events:none;

      transition:opacity 3s ease;
    }

    .mac-window{
      width:680px;
      min-height:420px;

      position:relative;
      z-index:2;

      overflow:hidden;

      border-radius:12px;

      background:rgba(30,30,30,.25);

      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);

      box-shadow:
        0 0 0 .5px rgba(255,255,255,.08),
        0 8px 32px rgba(0,0,0,.6),
        0 32px 80px rgba(0,0,0,.4),
        0 2px 4px rgba(0,0,0,.5);

      display:flex;
      flex-direction:column;

      animation:showWindow .4s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes showWindow{

      from{
        opacity:0;
        transform:scale(.92) translateY(16px);
      }

      to{
        opacity:1;
        transform:scale(1) translateY(0);
      }

    }

    .title-bar{
      height:44px;

      display:flex;
      align-items:center;

      padding:0 16px;

      position:relative;

      background:rgba(44,44,44,.25);

      border-bottom:1px solid rgba(255,255,255,.06);

      user-select:none;

      flex-shrink:0;
    }

    .traffic-lights{
      display:flex;
      align-items:center;
      gap:8px;

      z-index:2;
    }

    .dot{
      width:12px;
      height:12px;

      border-radius:50%;

      transition:filter .15s ease;
    }

    .dot:hover{
      filter:brightness(1.2);
    }

    .dot-red{
      background:#ff5f57;
    }

    .dot-yellow{
      background:#febc2e;
    }

    .dot-green{
      background:#28c840;
    }

    .window-title{
      position:absolute;
      left:50%;

      transform:translateX(-50%);

      font-size:13px;
      font-weight:500;

      color:rgba(255,255,255,.45);

      letter-spacing:.01em;
    }

    .window-content{
      flex:1;

      min-height:320px;
      padding:32px;

      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;

      gap:24px;
    }

    #typeTarget{
      color:rgba(255,255,255,.75);

      font-size:15px;
      letter-spacing:.03em;

      transition:opacity .4s ease;
    }

    #textLines{
      width:85%;

      display:none;
      flex-direction:column;
      align-items:center;

      gap:14px;

      text-align:center;

      opacity:0;

      transition:opacity 1.5s ease;
    }

    .text-line{
      color:rgba(255,255,255,.75);

      font-size:16px;
      line-height:1.5;

      letter-spacing:.02em;
    }

    .text-line-with-images{
      display:flex;
      align-items:center;
      justify-content:center;

      gap:8px;
    }

    .inline-img{
      width:29px;
      height:29px;

      display:block;

      border-radius:4px;
      object-fit:cover;

      opacity:.85;
    }

    .image-row{
      display:none;

      align-items:center;
      justify-content:center;

      gap:12px;

      opacity:0;

      transition:opacity 1.5s ease;
    }

    .image-row a{
      width:40px;
      height:40px;

      display:block;

      overflow:hidden;

      border-radius:8px;

      opacity:.85;

      transition:
        transform .2s ease,
        opacity .2s ease;
    }

    .image-row a:hover{
      opacity:1;
      transform:scale(1.06);
    }

    .image-row img{
      width:100%;
      height:100%;

      display:block;

      object-fit:cover;
    }

  </style>
</head>

<body>

  <video
    id="bgVideo"
    src="https://asset.verslaving.lol/verslaving/v1qtxx.mp4"
    loop
    muted
    playsinline>
  </video>

  <audio
    id="bgAudio"
    src="https://asset.verslaving.lol/verslaving/e99dbi.mp3"
    loop>
  </audio>

  <div class="mac-window">

    <div class="title-bar">

      <div class="traffic-lights">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
      </div>

      <span class="window-title">
        verslaving.lol
      </span>

    </div>

    <div class="window-content">

      <span id="typeTarget"></span>

      <div id="textLines">

        <div class="text-line text-line-with-images">

          <img
            class="inline-img"
            src="https://asset.verslaving.lol/verslaving/troll-left.png"
            alt="">

          <span class="text-line">
            1970
          </span>

          <img
            class="inline-img"
            src="https://asset.verslaving.lol/verslaving/troll-right.png"
            alt="">

        </div>

        <div class="text-line">Society is beginning to rot</div>
        <div class="text-line">Time to heal!</div>
        <div class="text-line">Join us, let's cleanse the world of freaks.</div>
        <div class="text-line">In the name of His Majesty Satan!</div>

        <div class="text-line text-line-with-images">

          <img
            class="inline-img"
            src="https://asset.verslaving.lol/verslaving/troll-left.png"
            alt="">

          <span class="text-line">
            #Lulz #Rekt
          </span>

          <img
            class="inline-img"
            src="https://asset.verslaving.lol/verslaving/troll-right.png"
            alt="">

        </div>

      </div>

      <div class="image-row" id="imageRow">

        <a
          href="https://discord.com/users/271116382475649037"
          target="_blank">

          <img
            src="https://asset.verslaving.lol/verslaving/discord.png"
            alt="discord">

        </a>

        <a
          href="https://soundcloud.com/j6qc"
          target="_blank">

          <img
            src="https://asset.verslaving.lol/verslaving/soundcloud.png"
            alt="soundcloud">

        </a>

        <a
          href="https://open.spotify.com/artist/571j4bNPyNAixE3HldpiAN?si=_TIYpBOnQkucxmv0jakg6Qm"
          target="_blank">

          <img
            src="https://asset.verslaving.lol/verslaving/spotify.png"
            alt="spotify">

        </a>

      </div>

    </div>

  </div>

  <script>

    const introText = "click enter to continue";

    const typeTarget = document.getElementById("typeTarget");
    const linesBox = document.getElementById("textLines");
    const socials = document.getElementById("imageRow");

    const bgVideo = document.getElementById("bgVideo");
    const bgAudio = document.getElementById("bgAudio");

    let currentIndex = 0;
    let introFinished = false;
    let pageActivated = false;

    function startTyping(){

      const typing = setInterval(() => {

        typeTarget.textContent += introText[currentIndex];

        currentIndex++;

        if(currentIndex >= introText.length){

          clearInterval(typing);
          introFinished = true;

        }

      },35);

    }

    setTimeout(startTyping,600);

    function activatePage(event){

      if(!introFinished) return;

      if(pageActivated) return;

      if(event.target.closest(".image-row")) return;

      pageActivated = true;

      const root = document.documentElement;

      if(root.requestFullscreen){
        root.requestFullscreen();
      }
      else if(root.webkitRequestFullscreen){
        root.webkitRequestFullscreen();
      }

      typeTarget.style.opacity = "0";

      setTimeout(() => {

        typeTarget.style.display = "none";

        linesBox.style.display = "flex";
        socials.style.display = "flex";

        setTimeout(() => {

          linesBox.style.opacity = "1";
          socials.style.opacity = "1";

        },20);

      },400);

      bgVideo.muted = true;
      bgVideo.play();

      bgAudio.volume = 0;
      bgAudio.play();

      setTimeout(() => {
        bgVideo.style.opacity = "1";
      },50);

      const fadeLength = 1500;
      const totalSteps = 60;
      const intervalSpeed = fadeLength / totalSteps;

      let fadeStep = 0;

      const fade = setInterval(() => {

        fadeStep++;

        bgAudio.volume = Math.min(fadeStep / totalSteps,1);

        if(fadeStep >= totalSteps){
          clearInterval(fade);
        }

      },intervalSpeed);

    }

    document.addEventListener("keydown",activatePage);
    document.addEventListener("click",activatePage);

  </script>

</body>
</html>
