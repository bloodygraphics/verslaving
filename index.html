<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>#lulz</title>

  <link rel="icon" type="image/png" href="https://asset.verslaving.lol/verslaving/troll-left.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <video
    id="bgVideo"
    src="https://asset.verslaving.lol/verslaving/v1qtxx.mp4"
    loop
    muted
    playsinline>
  </video>

  <audio
    id="bgAudio"
    src="https://asset.verslaving.lol/verslaving/e99dbi.mp3"
    loop>
  </audio>

  <div class="mac-window">

    <div class="title-bar">

      <div class="traffic-lights">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
      </div>

      <span class="window-title">
        verslaving.lol
      </span>

    </div>

    <div class="window-content">

      <span id="typeTarget"></span>

      <div id="textLines">

        <div class="text-line text-line-with-images">

          <img
            class="inline-img"
            src="https://asset.verslaving.lol/verslaving/troll-left.png"
            alt="">

          <span class="text-line">
            1970
          </span>

          <img
            class="inline-img"
            src="https://asset.verslaving.lol/verslaving/troll-right.png"
            alt="">

        </div>

        <div class="text-line">Society is beginning to rot</div>
        <div class="text-line">Time to heal!</div>
        <div class="text-line">Join us, let's cleanse the world of freaks.</div>
        <div class="text-line">In the name of His Majesty Satan!</div>

        <div class="text-line text-line-with-images">

          <img
            class="inline-img"
            src="https://asset.verslaving.lol/verslaving/troll-left.png"
            alt="">

          <span class="text-line">
            #Lulz #Rekt
          </span>

          <img
            class="inline-img"
            src="https://asset.verslaving.lol/verslaving/troll-right.png"
            alt="">

        </div>

      </div>

      <div class="image-row" id="imageRow">

        <a
          href="https://discord.com/users/271116382475649037"
          target="_blank">

          <img
            src="https://asset.verslaving.lol/verslaving/discord.png"
            alt="discord">

        </a>

        <a
          href="https://soundcloud.com/j6qc"
          target="_blank">

          <img
            src="https://asset.verslaving.lol/verslaving/soundcloud.png"
            alt="soundcloud">

        </a>

        <a
          href="https://open.spotify.com/artist/571j4bNPyNAixE3HldpiAN?si=_TIYpBOnQkucxmv0jakg6Qm"
          target="_blank">

          <img
            src="https://asset.verslaving.lol/verslaving/spotify.png"
            alt="spotify">

        </a>

      </div>

    </div>

  </div>

  <script>

    const introText = "click enter to continue";

    const typeTarget = document.getElementById("typeTarget");
    const linesBox = document.getElementById("textLines");
    const socials = document.getElementById("imageRow");

    const bgVideo = document.getElementById("bgVideo");
    const bgAudio = document.getElementById("bgAudio");

    let currentIndex = 0;
    let introFinished = false;
    let pageActivated = false;

    function startTyping(){

      const typing = setInterval(() => {

        typeTarget.textContent += introText[currentIndex];

        currentIndex++;

        if(currentIndex >= introText.length){

          clearInterval(typing);
          introFinished = true;

        }

      },35);

    }

    setTimeout(startTyping,600);

    function activatePage(event){

      if(!introFinished) return;

      if(pageActivated) return;

      if(event.target.closest(".image-row")) return;

      pageActivated = true;

      const root = document.documentElement;

      if(root.requestFullscreen){
        root.requestFullscreen();
      }
      else if(root.webkitRequestFullscreen){
        root.webkitRequestFullscreen();
      }

      typeTarget.style.opacity = "0";

      setTimeout(() => {

        typeTarget.style.display = "none";

        linesBox.style.display = "flex";
        socials.style.display = "flex";

        setTimeout(() => {

          linesBox.style.opacity = "1";
          socials.style.opacity = "1";

        },20);

      },400);

      bgVideo.muted = true;
      bgVideo.play();

      bgAudio.volume = 0;
      bgAudio.play();

      setTimeout(() => {
        bgVideo.style.opacity = "1";
      },50);

      const fadeLength = 1500;
      const totalSteps = 60;
      const intervalSpeed = fadeLength / totalSteps;

      let fadeStep = 0;

      const fade = setInterval(() => {

        fadeStep++;

        bgAudio.volume = Math.min(fadeStep / totalSteps,1);

        if(fadeStep >= totalSteps){
          clearInterval(fade);
        }

      },intervalSpeed);

    }

    document.addEventListener("keydown",activatePage);
    document.addEventListener("click",activatePage);

  </script>

</body>
</html>
